<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="styles.css">
    <title>QUIZ GAME</title>
</head>
<body>
<div class="container">
    <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your general knowledge with these questions</p>
        <button id="start-btn">Start Quiz</button>
    </div>
    <div class="screen " id="quiz-screen">
        <h2 id="question-text"></h2>
        <div class="quiz-info">
            <p>Question <span id="current-question"></span> out of
                <span id="total-question"></span></p>
            <p>Score: <span id="score"></span></p>
        </div>
        <div class="answers-container" id="answers-container">
            <!-- answer button will be inserted dynamically -->
        </div>
        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
    </div>
    <div class="screen " id="result-screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
            <p>You scored <span id="final-score"></span> out of
                <span id="max-score"></span></p>
            <div id="result-message">

            </div>

        </div>
        <button id="restart-btn">Restart Quiz</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
